{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfiniDigital - Login</title>
    <meta name="description" content="3D Glassmorphism Dashboard Template by TemplateMo">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/admin/templatemo-glass-admin-style.css' %}">

    <!--

TemplateMo 607 Glass Admin

https://templatemo.com/tm-607-glass-admin

-->
</head>
<body>
{% include 'admin/admin_loading_screen.html' %}
    <!-- Animated Background -->
    <div class="background"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="login-page">
        <!-- Theme Toggle -->
        <button class="theme-toggle-float" id="theme-toggle" title="Toggle Light/Dark Mode">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/>
                <path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/>
                <path d="M2 12h2"/><path d="M20 12h2"/>
                <path d="M6.34 17.66l-1.41 1.41"/><path d="M19.07 4.93l-1.41 1.41"/>
            </svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>

        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-logo">ID</div>
                    <h1 class="login-title">Welcome Back</h1>
                    <p class="login-subtitle">Sign in to continue to InfiniDash</p>
                </div>

                <form id="loginForm" method="POST" action="{% url 'admin_login' %}">
                    {% csrf_token %}
                    <div class="form-group">
                        <label class="form-label" for="username">Username</label>
                        <input type="text" name="username" id="username" class="form-input" placeholder="Enter your Username" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" name="password" id="password" class="form-input" placeholder="Enter your password" required>
                    </div>

                    <div class="form-row">
                        <a href="{% url 'forgot_password' %}" class="forgot-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary" id="loginBtn">
                        <span class="btn-text">Sign In</span>
                        <span class="btn-loader" style="display:none;">⏳</span>
                    </button>
                </form>


            </div>
        </div>

        <!-- Footer -->
        <footer class="site-footer">
            <p>Copyright © 2026 Your Company. Designed by <a href="/" target="_blank" rel="nofollow">Infinidigital</a></p>
        </footer>
    </div>

<div id="toast" class="toast"></div>


<script>
function showToast(message, type = "success") {
  const toast = document.getElementById("toast");
  if (!toast) return;

  toast.textContent = message;
  toast.className = "toast show " + type;

  setTimeout(() => {
    toast.classList.remove("show");
  }, 3000);
}

document.addEventListener("DOMContentLoaded", function () {

  // ✅ SHOW DJANGO MESSAGES
  {% if messages %}
    {% for message in messages %}
      showToast("{{ message|escapejs }}", "{{ message.tags }}");

      // ✅ restore button if error
      {% if "error" in message.tags %}
        const btn = document.getElementById("loginBtn");
        if (btn) {
          btn.querySelector(".btn-text").style.display = "inline";
          btn.querySelector(".btn-loader").style.display = "none";
        }
      {% endif %}
    {% endfor %}
  {% endif %}

  // ✅ FORM SUBMIT LOADER
  const form = document.getElementById("loginForm");
  if (form) {
    form.addEventListener("submit", function () {
      const btn = document.getElementById("loginBtn");
      if (btn) {
        btn.querySelector(".btn-text").style.display = "none";
        btn.querySelector(".btn-loader").style.display = "inline";
      }
    });
  }

});
</script>
</body>
</html>
