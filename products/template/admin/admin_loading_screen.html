<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .loading-screen {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, #0a0a0a, #000);
    z-index: 10000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Smooth fade out */
.loading-screen.hidden {
    opacity: 0;
    visibility: hidden;
    transition: all 0.8s ease;
}

/* Infinity SVG */
.loader-infinity svg {
    width: 380px;
    height: 190px;
}

/* Animated path */
.infinity-path {
    stroke: url(#gradient);
    stroke-width: 10;
    stroke-linecap: round;
    fill: none;
    stroke-dasharray: 720;
    stroke-dashoffset: 720;

    animation: draw 3.5s linear infinite,
               glow 2s ease-in-out infinite alternate;
}

/* Drawing motion */
@keyframes draw {
    0%   { stroke-dashoffset: 720; }
    50%  { stroke-dashoffset: 0; }
    100% { stroke-dashoffset: -720; }
}

/* Glow effect 🔥 */
@keyframes glow {
    0%   { filter: drop-shadow(0 0 5px #5a3eea); }
    100% { filter: drop-shadow(0 0 25px #8b6cff); }
}

/* Animated text */
.loading-text {
    margin-top: 30px;
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    letter-spacing: 4px;
    text-transform: uppercase;
    display: flex;
    gap: 2px;
}

/* Letter animation */
.loading-text span {
    color: #aaa;
    animation: bounce 1.2s infinite;
}

/* Stagger delay */
.loading-text span:nth-child(1) { animation-delay: 0s; }
.loading-text span:nth-child(2) { animation-delay: 0.1s; }
.loading-text span:nth-child(3) { animation-delay: 0.2s; }
.loading-text span:nth-child(4) { animation-delay: 0.3s; }
.loading-text span:nth-child(5) { animation-delay: 0.4s; }
.loading-text span:nth-child(6) { animation-delay: 0.5s; }
.loading-text span:nth-child(7) { animation-delay: 0.6s; }
.loading-text span:nth-child(8) { animation-delay: 0.7s; }
.loading-text span:nth-child(9) { animation-delay: 0.8s; }
.loading-text span:nth-child(10){ animation-delay: 0.9s; }
.loading-text span:nth-child(11){ animation-delay: 1s; }
.loading-text span:nth-child(12){ animation-delay: 1.1s; }
.loading-text span:nth-child(13){ animation-delay: 1.2s; }

/* Bounce effect */
@keyframes bounce {
    0%, 100% {
        transform: translateY(0);
        color: #aaa;
    }
    50% {
        transform: translateY(-10px);
        color: #fff;
        text-shadow: 0 0 10px #8b6cff;
    }
}
    </style>
</head>
<body>
<div class="cursor-glow"></div>
<div class="loading-screen" id="loadingScreen">
    <div class="loader-infinity">
        <svg viewBox="0 0 400 200">
            <defs>
                <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#5a3eea"/>
                    <stop offset="50%" stop-color="#8b6cff"/>
                    <stop offset="100%" stop-color="#00d4ff"/>
                </linearGradient>
            </defs>
            <path d="M80,100
                     C80,40 180,40 200,100
                     C220,160 320,160 320,100
                     C320,40 220,40 200,100
                     C180,160 80,160 80,100 Z"
                  class="infinity-path"/>
        </svg>
    </div>

    <div class="loading-text">
        <span>I</span><span>n</span><span>f</span><span>i</span><span>n</span><span>i</span><span>D</span><span>i</span><span>g</span><span>i</span><span>t</span><span>a</span><span>l</span>
    </div>
</div>
<script>
    window.addEventListener('load', () => {
   setTimeout(() => {
      document.getElementById('loadingScreen').classList.add('hidden');
   }, 2000);
});
</script>
</body>
</html>
