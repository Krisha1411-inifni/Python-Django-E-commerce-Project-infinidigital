    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index:1055;">

  {% for message in messages %}
  <div class="toast align-items-center text-white border-0 mb-2
       {% if message.tags == 'success' %}bg-success
       {% elif message.tags == 'warning' %}bg-warning text-dark
       {% elif message.tags == 'error' %}bg-danger
       {% else %}bg-primary{% endif %}"
       role="alert"
       aria-live="assertive"
       aria-atomic="true"
       data-bs-delay="5000">

    <div class="d-flex">
      <div class="toast-body">
        {{ message }}
      </div>
      <button type="button"
              class="btn-close btn-close-white me-2 m-auto"
              data-bs-dismiss="toast"
              aria-label="Close"></button>
    </div>

  </div>
  {% endfor %}

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  document.querySelectorAll(".toast").forEach(function (toastEl) {
    new bootstrap.Toast(toastEl).show();
  });
});

document.addEventListener("DOMContentLoaded", function () {

    const currentPath = window.location.pathname.replace(/\/$/, "");

    const navLinks = document.querySelectorAll(".navbar-nav .nav-link");

    navLinks.forEach(link => {

        let linkPath = new URL(link.href).pathname.replace(/\/$/, "");

        if(linkPath === "" && currentPath === ""){
            link.classList.add("active");
        }

        else if(linkPath !== "" && currentPath.startsWith(linkPath)){
            link.classList.add("active");
        }

    });

});
</script>
